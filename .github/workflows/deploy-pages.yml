name: Deploy static files to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/app.js'
      - 'docs/styles.css'
      - 'docs/index.html'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Google API key into app.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          sed -i "s/__GEMINI_KEY__/${GEMINI_API_KEY}/g" docs/app.js

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler --silent
          wrangler pages deploy docs \
            --project-name=investment-dashboard \
            --commit-dirty=true
