name: LINE 投資夜盤報

on:
  workflow_dispatch:
    inputs:
      session:
        description: "session (evening)"
        required: false
        default: "evening"
      triggered_at:
        description: "觸發時間"
        required: false
        default: ""
      rf_annual:
        description: "年化無風險利率（凸最佳化用，預設 0.04）"
        required: false
        default: "0.04"

permissions:
  contents: write

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Step 1：夜盤報 + report.json ──────────────────────────────────
      - name: Run LINE Bot + generate report.json
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
          AV_API_KEY_2: ${{ secrets.AV_API_KEY_2 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SESSION: evening
          TRIGGERED_AT: ${{ inputs.triggered_at }}
        run: python main.py

      # ── Step 2：凸最佳化 → portfolio_optimization.json ──────────────
      - name: Run portfolio optimizer
        id: optimizer
        continue-on-error: true          # 失敗不阻斷後續 commit/deploy
        run: |
          python portfolio_optimizer.py \
            --no-plot \
            --start 2020-01-01 \
            --rf "${{ inputs.rf_annual || '0.04' }}"

      - name: Copy portfolio JSON to dashboard data
        if: steps.optimizer.outcome == 'success'
        run: |
          DATE=$(date '+%Y-%m-%d')
          JSON_SRC="portfolio_reports/${DATE}/portfolio_optimization.json"
          if [ -f "$JSON_SRC" ]; then
            mkdir -p docs/data
            cp "$JSON_SRC" docs/data/portfolio_optimization.json
            echo "Copied $JSON_SRC -> docs/data/portfolio_optimization.json"
          else
            echo "Warning: $JSON_SRC not found, skipping"
          fi

      # ── Step 3：一次性 commit 所有資料 ────────────────────────────────
      - name: Commit and push dashboard data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/report.json \
                  docs/data/portfolio_optimization.json \
                  portfolio_reports/ || true
          git diff --cached --quiet || \
            git commit -m "chore: update dashboard data [skip ci]"
          git push

      # ── Step 4：部署到 Cloudflare Pages ──────────────────────────────
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler --silent
          wrangler pages deploy docs --project-name=investment-dashboard --commit-dirty=true

      # ── 失敗通知 ──────────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          SESSION: evening
        run: python notify_failure.py
