name: LINE 投資夜盤報

on:
  workflow_dispatch:
    inputs:
      session:
        description: "session (evening)"
        required: false
        default: "evening"
      triggered_at:
        description: "觸發時間"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LINE Bot + generate report.json
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
          AV_API_KEY_2: ${{ secrets.AV_API_KEY_2 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SESSION: evening
          TRIGGERED_AT: ${{ inputs.triggered_at }}
        run: python main.py

      - name: Commit and push report.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/report.json
          git diff --cached --quiet || git commit -m "chore: update report.json [skip ci]"
          git push

      - name: Notify on failure
        if: failure()
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          SESSION: evening
        run: python notify_failure.py
