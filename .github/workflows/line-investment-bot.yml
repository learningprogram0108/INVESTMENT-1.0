name: LINE 投資每日早報

on:
  workflow_dispatch:
    inputs:
      session:
        description: "morning（早盤）or evening（夜盤）"
        required: true
        default: "morning"
      triggered_at:
        description: "觸發時間（由 Cloudflare 帶入）"
        required: false
        default: ""

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LINE Bot
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SESSION: ${{ inputs.session }}
          TRIGGERED_AT: ${{ inputs.triggered_at }}
        run: python main.py

      - name: Notify on failure
        if: failure()
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          SESSION: ${{ inputs.session }}
        run: python notify_failure.py
