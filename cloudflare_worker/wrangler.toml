name = "line-investment-trigger"
main = "index.js"
compatibility_date = "2024-01-01"

# Cron Triggers
# 台灣時間 09:30 = UTC 01:30
# 週一到週六（1=週一, 6=週六）
[triggers]
crons = ["30 1 * * 1-6"]

# Secrets（透過 CLI 設定，不要寫在這裡）
# wrangler secret put GH_PAT
# wrangler secret put GH_REPO       # 格式: "username/repo-name"
# wrangler secret put GH_BRANCH     # 預設 main
# wrangler secret put GH_WORKFLOW   # 預設 line-investment-bot.yml
